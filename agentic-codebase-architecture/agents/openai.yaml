interface:
  display_name: "Agentic Codebase Architecture Restructurer"
  short_description: "Safe modular refactors with bug hunts"
  default_prompt: "Improve this codebase architecture so it is modular, readable, scalable, bug-resistant, senior-engineer clean, and easy for future agents to navigate. Before deep code exploration, grill me with a structured project briefing covering product, users, platforms, priorities, protected behavior, UX expectations, constraints, performance needs, risks, and validation. Use the embedded grilling protocol; do not require a separate grill skill. Create a restore point before editing. Preserve intended functionality, UX smoothness, convenience, polish, and user satisfaction. Use focused subagents for architecture, UX, tests, bug hunts, and future bug prevention when broad. Fix confirmed bugs only when restoring intended behavior; treat ambiguous behavior as compatibility-sensitive. Address performance only where critical or requested. Verify nothing broke."
